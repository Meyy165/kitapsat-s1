<ui:composition template="/template.xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core">
    <ui:define name="mainContent">
        <div class="edit-publisher-form" style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 2rem 0; font-size: 2rem; font-weight: bold; text-align: center;">✏️ Yayınevi Düzenle</h2>
            
            <h:form>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">Yayınevi Adı *</label>
                    <h:inputText id="name" value="#{publisherBean.publisher.name}" styleClass="form-control" 
                                required="true" 
                                style="width: 100%; padding: 0.8rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s ease;"
                                onfocus="this.style.borderColor='#f093fb'" 
                                onblur="this.style.borderColor='#e9ecef'"/>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label for="phone" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">Telefon</label>
                        <h:inputText id="phone" value="#{publisherBean.publisher.phone}" styleClass="form-control" 
                                    placeholder="0 (555) 555-5555"
                                    style="width: 100%; padding: 0.8rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s ease;"
                                    onfocus="this.style.borderColor='#f093fb'" 
                                    onblur="this.style.borderColor='#e9ecef'"/>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">E-posta</label>
                        <h:inputText id="email" value="#{publisherBean.publisher.email}" styleClass="form-control" 
                                    placeholder="info@yayinevi.com"
                                    style="width: 100%; padding: 0.8rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s ease;"
                                    onfocus="this.style.borderColor='#f093fb'" 
                                    onblur="this.style.borderColor='#e9ecef'"/>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="address" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">Adres</label>
                    <h:inputTextarea id="address" value="#{publisherBean.publisher.address}" styleClass="form-control" 
                                    rows="3" 
                                    placeholder="Yayınevi adresi..."
                                    style="width: 100%; padding: 0.8rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; resize: vertical; transition: border-color 0.3s ease;"
                                    onfocus="this.style.borderColor='#f093fb'" 
                                    onblur="this.style.borderColor='#e9ecef'"/>
                </div>
                
                <div class="form-actions" style="text-align: center; padding-top: 2rem; border-top: 2px solid #f0f0f0;">
                    <h:commandButton value="💾 Güncelle" 
                                   action="#{publisherBean.updatePublisher()}"
                                   style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 1rem 3rem; border-radius: 50px; font-size: 1.1rem; font-weight: bold; margin-right: 1rem; box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4); transition: all 0.3s ease; cursor: pointer;"
                                   onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(240, 147, 251, 0.6)';"
                                   onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(240, 147, 251, 0.4)';"/>
                    <h:link value="❌ İptal" 
                           outcome="/admin/publishers.xhtml" 
                           style="background: #6c757d; color: white; padding: 1rem 3rem; border-radius: 50px; font-size: 1.1rem; font-weight: bold; text-decoration: none; display: inline-block; box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3); transition: all 0.3s ease;"
                           onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(108, 117, 125, 0.5)';"
                           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(108, 117, 125, 0.3)';"/>
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
