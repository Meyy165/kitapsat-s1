<ui:composition template="/template.xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core">
    <ui:define name="mainContent">
        <div class="edit-book-form" style="max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 0.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <div style="background: white; padding: 2rem; border-radius: 12px;">
                    <h2 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0 0 2rem 0; font-size: 2rem; font-weight: bold; text-align: center;">✏️ Kitap Düzenle</h2>
                </div>
            </div>
            
            <h:form>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="title">Kitap Adı *</label>
                        <h:inputText id="title" value="#{bookBean.book.title}" styleClass="form-control" required="true"/>
                    </div>
                    
                    <div class="form-group">
                        <label for="isbn">ISBN *</label>
                        <h:inputText id="isbn" value="#{bookBean.book.isbn}" styleClass="form-control" required="true"/>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Açıklama</label>
                    <h:inputTextarea id="description" value="#{bookBean.book.description}" styleClass="form-control" rows="4"/>
                </div>
                
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="price">Fiyat (TL) *</label>
                        <h:inputText id="price" value="#{bookBean.book.price}" styleClass="form-control" required="true">
                            <f:convertNumber type="number" minFractionDigits="2" maxFractionDigits="2"/>
                        </h:inputText>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock">Stok Miktarı *</label>
                        <h:inputText id="stock" value="#{bookBean.book.stockQuantity}" styleClass="form-control" required="true">
                            <f:convertNumber integerOnly="true"/>
                        </h:inputText>
                    </div>
                    
                    <div class="form-group">
                        <label for="imageUrl">Resim URL</label>
                        <h:inputText id="imageUrl" value="#{bookBean.book.imageUrl}" styleClass="form-control"/>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">👥 Yazarlar</label>
                    <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 12px; border: 2px solid #e9ecef; transition: border-color 0.3s ease;"
                         onmouseover="this.style.borderColor='#667eea'" 
                         onmouseout="this.style.borderColor='#e9ecef'">
                        <h:selectManyCheckbox value="#{bookBean.selectedAuthorIds}" layout="pageDirection" styleClass="author-checkboxes" 
                                            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem;">
                            <f:selectItems value="#{bookBean.authors}" var="author" 
                                          itemValue="#{author.id}" 
                                          itemLabel="#{author.name} #{author.surname}"/>
                        </h:selectManyCheckbox>
                        <ui:fragment rendered="#{empty bookBean.authors}">
                            <div style="text-align: center; padding: 1rem; color: #6c757d;">
                                <div style="font-size: 2rem; margin-bottom: 0.5rem;">👥</div>
                                <p>Henüz yazar bulunmuyor. Önce yazar ekleyin.</p>
                                <h:link value="Yazar Ekle" outcome="/admin/add-author.xhtml" 
                                       style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.9rem;"/>
                            </div>
                        </ui:fragment>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">🏢 Yayınevi</label>
                    <div style="background: #f8f9fa; padding: 1rem; border-radius: 12px; border: 2px solid #e9ecef; transition: border-color 0.3s ease;"
                         onmouseover="this.style.borderColor='#f093fb'" 
                         onmouseout="this.style.borderColor='#e9ecef'">
                        <h:selectOneMenu value="#{bookBean.selectedPublisherId}" styleClass="form-control" 
                                       style="background: white; border: 2px solid #dee2e6; border-radius: 8px; padding: 0.8rem; font-size: 1rem; transition: border-color 0.3s ease;"
                                       onfocus="this.style.borderColor='#f093fb'" 
                                       onblur="this.style.borderColor='#dee2e6'">
                            <f:selectItem itemValue="" itemLabel="📋 Yayınevi Seçiniz"/>
                            <f:selectItems value="#{bookBean.publishers}" var="publisher" 
                                          itemValue="#{publisher.id}" 
                                          itemLabel="#{publisher.name}"/>
                        </h:selectOneMenu>
                        <ui:fragment rendered="#{empty bookBean.publishers}">
                            <div style="text-align: center; padding: 1rem; color: #6c757d; margin-top: 1rem;">
                                <div style="font-size: 2rem; margin-bottom: 0.5rem;">🏢</div>
                                <p>Henüz yayınevi bulunmuyor. Önce yayınevi ekleyin.</p>
                                <h:link value="Yayınevi Ekle" outcome="/admin/add-publisher.xhtml" 
                                       style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.9rem;"/>
                            </div>
                        </ui:fragment>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #495057;">📚 Kategoriler</label>
                    <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 12px; border: 2px solid #e9ecef; transition: border-color 0.3s ease;"
                         onmouseover="this.style.borderColor='#fa709a'" 
                         onmouseout="this.style.borderColor='#e9ecef'">
                        <h:selectManyCheckbox value="#{bookBean.selectedCategoryIds}" layout="pageDirection" styleClass="category-checkboxes" 
                                            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem;">
                            <f:selectItems value="#{bookBean.categories}" var="category" 
                                          itemValue="#{category.id}" 
                                          itemLabel="#{category.name}"/>
                        </h:selectManyCheckbox>
                        <ui:fragment rendered="#{empty bookBean.categories}">
                            <div style="text-align: center; padding: 1rem; color: #6c757d;">
                                <div style="font-size: 2rem; margin-bottom: 0.5rem;">📚</div>
                                <p>Henüz kategori bulunmuyor. Önce kategori ekleyin.</p>
                                <h:link value="Kategori Ekle" outcome="/admin/add-category.xhtml" 
                                       style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.9rem;"/>
                            </div>
                        </ui:fragment>
                    </div>
                </div>
                
                <div class="form-actions" style="margin-top: 2rem; text-align: center; padding-top: 2rem; border-top: 2px solid #f0f0f0;">
                    <h:commandButton value="💾 Güncelle" 
                                   action="#{bookBean.updateBook()}"
                                   style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 1rem 3rem; border-radius: 50px; font-size: 1.1rem; font-weight: bold; margin-right: 1rem; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); transition: all 0.3s ease; cursor: pointer;"
                                   onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.6)';"
                                   onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';"/>
                    <h:link value="❌ İptal" 
                           outcome="/admin/books.xhtml" 
                           style="background: #6c757d; color: white; padding: 1rem 3rem; border-radius: 50px; font-size: 1.1rem; font-weight: bold; text-decoration: none; display: inline-block; box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3); transition: all 0.3s ease;"
                           onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(108, 117, 125, 0.5)';"
                           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(108, 117, 125, 0.3)';"/>
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
