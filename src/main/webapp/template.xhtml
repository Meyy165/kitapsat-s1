<!DOCTYPE html>
<html lang="tr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">
<f:view locale="tr">
    <h:head>
        <title>Rafine Kitap</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <h:outputStylesheet library="css" name="bootstrap.min.css"/>
        <h:outputStylesheet library="css" name="app.css"/>
        <h:outputScript library="js" name="bootstrap.bundle.min.js"/>
    </h:head>
    <h:body>
        <div class="app-shell">
            <nav class="navbar navbar-expand-lg topbar">
                <div class="container">
                    <h:link outcome="/index.xhtml" styleClass="navbar-brand brand-mark">
                        <span class="brand-symbol">RK</span>
                        <span>Rafine Kitap</span>
                    </h:link>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                            aria-controls="mainNav" aria-expanded="false" aria-label="Men&#252;y&#252; a&#231;">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="mainNav">
                        <div class="navbar-nav ms-auto align-items-lg-center">
                            <h:link value="Ana Sayfa" outcome="/index.xhtml" styleClass="nav-link"/>
                            <h:link value="Kitaplar" outcome="/book/list.xhtml" styleClass="nav-link"/>
                            <h:link value="Sepet (#{cartBean.cartSize})" outcome="/cart/view.xhtml" styleClass="nav-link"/>
                            <h:link value="Destek" outcome="/support.xhtml" styleClass="nav-link"/>
                            <ui:fragment rendered="#{sessionScope.user != null}">
                                <h:link value="&#304;stek Listem" outcome="/user/wishlist.xhtml" styleClass="nav-link"/>
                                <h:link value="Profil" outcome="/user/profile.xhtml" styleClass="nav-link"/>
                                <h:link value="&#199;&#305;k&#305;&#351;" outcome="/logout.xhtml" styleClass="nav-link"/>
                            </ui:fragment>
                            <ui:fragment rendered="#{sessionScope.user == null}">
                                <h:link value="Giri&#351;" outcome="/login.xhtml" styleClass="nav-link"/>
                                <h:link value="Kay&#305;t" outcome="/user/register.xhtml" styleClass="nav-link nav-link-strong"/>
                            </ui:fragment>
                            <ui:fragment rendered="#{sessionScope.user != null and sessionScope.user.admin}">
                                <h:link value="Admin" outcome="/admin/index.xhtml" styleClass="nav-link nav-link-strong"/>
                            </ui:fragment>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="page-main">
                <ui:insert name="mainContent"/>
            </main>

            <footer class="footer">
                <div class="container footer-inner">
                    <div>
                        <strong>Rafine Kitap</strong>
                        <span>Se&#231;ili kitaplar, g&#252;venli al&#305;&#351;veri&#351; ve ak&#305;ll&#305; &#246;neriler.</span>
                    </div>
                    <span class="footer-note">2026</span>
                </div>
            </footer>

            <div class="assistant-widget" id="assistantWidget">
                <button type="button"
                        class="assistant-toggle"
                        aria-label="Rafine Asistan"
                        onclick="document.getElementById('assistantWidget').classList.toggle('assistant-open')">
                    AI
                </button>
                <div class="assistant-panel">
                    <div class="assistant-panel-head">
                        <div>
                            <strong>Rafine Asistan</strong>
                            <span>Kitap &#246;nerisi al</span>
                        </div>
                        <button type="button"
                                class="assistant-close"
                                aria-label="Kapat"
                                onclick="document.getElementById('assistantWidget').classList.remove('assistant-open')">
                            x
                        </button>
                    </div>
                    <h:form id="floatingAssistantForm">
                        <h:panelGroup id="assistantAnswer" layout="block" styleClass="assistant-bubble">
                            #{readingAssistantBean.answer}
                        </h:panelGroup>
                        <h:inputTextarea id="assistantQuestion"
                                         value="#{readingAssistantBean.question}"
                                         rows="3"
                                         styleClass="form-control assistant-input"/>
                        <h:commandButton value="Sor"
                                         action="#{readingAssistantBean.ask()}"
                                         styleClass="btn btn-dark btn-sm w-100 mt-2"/>
                        <h:link value="Sohbeti aç" outcome="/assistant.xhtml" styleClass="assistant-link"/>
                    </h:form>
                </div>
            </div>
        </div>
    </h:body>
</f:view>
</html>
